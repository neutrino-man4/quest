general:
  id: "RUN_001"
  seed: 42

data:
  base_path: /ceph/abal/QML/JetClass/
  jet_types:
    - HToBB
    - HToCC
    - HToGG
    - HToWW4Q
    - TTBar_
    - TTBarLep
    - WToQQ
    - ZJetsToNuNu
    - ZToQQ
  signal: TTBar_
  background: ZJetsToNuNu
  num_particles: 10
  n_train: 100000
  n_val: 20000
  n_test: 100000
  batch_size: 1
  pt_range: [500, 1000]
  flatten: true

circuit:
  device: default.gaussian
  qumodes: 10          # must match data.num_particles
  layers: 4            # number of variational layers
  shots: null          # null = analytic (exact); integer = sampled
  diff_method: parameter_shift
  measurement: homodyne  # homodyne (X quadrature) -> real value -> BCE via sigmoid

training:
  backend: autograd
  optimizer: adam
  learning_rate: 0.01
  epochs: 50
  loss: bce            # bce | mae
  checkpoint_every: 1  # save params every N epochs

paths:
  model_dir: /work/abal/quest/models/
  inference_results_dir: /ceph/abal/quest/
  log_dir: /work/abal/quest/logs/

wandb:
  enabled: false
  project: quest
  entity: null
  run_name: null
